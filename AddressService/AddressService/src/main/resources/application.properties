spring.application.name=address-service
server.port=8085

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.jpa.hibernate.ddl-auto=update
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.url=jdbc:postgresql://localhost:5432/AddressService
spring.datasource.driver-class-name=org.postgresql.Driver

spring.kafka.consumer.group-id=address-service
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fotoalpha.*
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.properties.spring.json.type.mapping=saveAddress:com.fotoalpha.addressservice.Events.SaveAddressEvent, deleteAddress:com.fotoalpha.addressservice.Events.DeleteAddressEvent
