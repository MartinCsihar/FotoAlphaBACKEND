spring.application.name=email-service
server.port=8084


mail.sender.username=${MAIL_SENDER_USERNAME}
mail.sender.password=${MAIL_SENDER_PASSWORD}
mail.sender.private.email=${MAIL_SENDER_PRIVATE_EMAIL}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Consumer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.type.mapping=appCreated:com.fotoalpha.emailservice.Objects.Events.AppointmentCreatedEvent,pwResetEmail:com.fotoalpha.emailservice.Objects.Events.SendPwResetEvent
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=email-service
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fotoalpha.*
spring.kafka.consumer.auto-offset-reset=latest
