services:
    eureka-server:
        build: ./EurekaServer/EurekaServer
        container_name: eureka_server
        ports:
            - "8761:8761"
        environment:
            - SPRING_APPLICATION_NAME=eureka-server
            - SERVER_PORT=8761
            - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
            - EUREKA_CLIENT_FETCH_REGISTRY=false
        healthcheck:
            test: ["CMD", "curl","-f","http://localhost:8761/"]
            interval: 10s
            timeout: 3s
            retries: 10
            
    api-gateway:
        build: ./ApiGateway/ApiGateway
        container_name: api_gateway
        ports:
            - "8081:8081"
        depends_on:
            eureka-server:
                condition: service_healthy
        environment:
            - SPRING_APPLICATION_NAME=api-gateway
            - SERVER_PORT=8081
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED=true
            - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_LOWER_CASE_SERVICE_ID=true

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: kafka
        ports:
            - "9094:9094"
        environment:
            - KAFKA_NODE_ID=1
            - KAFKA_PROCESS_ROLES=broker,controller
            - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
            - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:29093
            - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
            - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
            - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
            - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
            - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
            - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
        healthcheck:
            test: ["CMD", "bash", "-c","echo > /dev/tcp/localhost/9092"]
            interval: 10s
            timeout: 3s
            retries: 10

    kafdrop:
        image: obsidiandynamics/kafdrop
        container_name: kafdrop
        ports:
          - "9000:9000"
        environment:
          - KAFKA_BROKERCONNECT=kafka:9092
          - KAFKA_PROPERTIES_SECURITY_PROTOCOL=PLAINTEXT
          - KAFKA_PROPERTIES_SASL_MECHANISM=PLAIN
        depends_on:
            kafka:
                condition: service_healthy 
            
    portfolio-service:
        build: ./PortfolioService/PortfolioService
        container_name: portfolio_service
        ports:
            - "8082:8082"
        depends_on:
            kafka:
                condition: service_healthy
            postgres:
                condition: service_healthy

            
        environment:
            - SPRING_APPLICATION_NAME=portfolio-service
            - SERVER_PORT=8082
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            - SPRING_JPA_HIBERNATE_DDL_AUTO=update
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=admin
            - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/PortfolioService
            - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=true
            - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
            - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
            - SPRING_KAFKA_CONSUMER_GROUP_ID=portfolio-service
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=savePhotos:com.fotoalpha.portfolioservice.KafkaEvents.SavePhotosEvent
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=com.fotoalpha.*
            - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=latest
        healthcheck:
            test: ["CMD", "curl", "-f" ,"http://localhost:8082/health"]
            interval: 10s
            timeout: 3s
            retries: 10

    postgres:
        image: postgres:latest
        container_name: postgresql
        ports:
            - "5433:5432"
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=admin
        volumes:
            - pgdata:/var/lib/postgresql
        healthcheck:
            test: ["CMD","pg_isready", "-U", "postgres"]
            interval: 10s
            timeout: 5s
            retries: 10

    aws-service:
        build: ./AwsService/AwsService
        container_name: aws_service
        ports:
            - "8083:8083"
        depends_on:
            kafka:
                condition: service_healthy
            eureka-server:
                condition: service_healthy
        env_file:
            - .env
        environment:
            - SPRING_APPLICATION_NAME=aws-service
            - SERVER_PORT=8083
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
            - AWS_BUCKET_NAME=${AWS_BCKT_NAME}
            - AWS_REGION=${AWS_REGION}
            - AWS_CREDENTIALS_SECRET_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_CREDENTIALS_ACCESS_KEY=${AWS_ACCESS_KEY_ID}
            - JWT_SECRET_KEY=${JWT_SECRET_KEY_GEN}
            - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_ADD_TYPE_HEADERS=true
            - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=savePhotos:com.fotoalpha.awsservice.Events.SavePhotosEvent,saveProfPic:com.fotoalpha.awsservice.Events.SaveProfilePictureEvent
            - SPRING_KAFKA_PRODUCER_KEY_SERIALIZER=org.apache.kafka.common.serialization.StringSerializer
            - SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER=org.springframework.kafka.support.serializer.JsonSerializer
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=50MB
            - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=50MB
        healthcheck:
            test: ["CMD", "curl", "-f" ,"http://localhost:8083/health"]
            interval: 10s
            timeout: 3s
            retries: 10

    email-service:
        build: ./EmailService/EmailService
        container_name: email_service
        ports:
            - "8084:8084"
        env_file:
            - .env
        depends_on:
            eureka-server:
                condition: service_healthy
            kafka:
                condition: service_healthy
        environment:
            - SPRING_APPLICATION_NAME=email-service
            - SERVER_PORT=8084
            - MAIL_SENDER_USERNAME=${MAIL_SENDER_USERNAME}
            - MAIL_SENDER_PASSWORD=${MAIL_SENDER_PASSWORD}
            - MAIL_SENDER_PRIVATE_EMAIL=${MAIL_SENDER_PRIVATE_EMAIL}
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=true
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=appCreated:com.fotoalpha.emailservice.KafkaEvents.AppointmentCreatedEvent,pwReset:com.fotoalpha.emailservice.KafkaEvents.SendMailEvent,galleryUpdated:com.fotoalpha.emailservice.KafkaEvents.GalleryUpdatedEvent
            - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
            - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
            - SPRING_KAFKA_CONSUMER_GROUP_ID=email-service
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=com.fotoalpha.*
            - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=latest
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
            interval: 10s
            timeout: 3s
            retries: 10
        

    address-service:
        build: ./AddressService/AddressService
        container_name: address_service
        ports:
            -  "8085:8085"
        env_file:
            - .env
        depends_on:
            eureka-server:
                condition: service_healthy
            kafka:
                condition: service_healthy
            postgres:
                condition: service_healthy
        environment:
            - SPRING_APPLICATION_NAME=address-service
            - SERVER_PORT=8085
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            - SPRING_JPA_HIBERNATE_DDL_AUTO=update
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=admin
            - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/AddressService
            - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver         
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=true
            - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
            - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
            - SPRING_KAFKA_CONSUMER_GROUP_ID=address-service
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=com.fotoalpha.*
            - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=latest      
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=saveAddress:com.fotoalpha.addressservice.Events.SaveAddressEvent,deleteAddress:com.fotoalpha.addressservice.Events.DeleteAddressEvent
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
            interval: 10s
            timeout: 3s
            retries: 10

    appointments-service:
        build: ./AppointmentsService/AppointmentsService
        container_name: appointments_service
        ports:
            - "8086:8086"
        depends_on:
            kafka:
                condition: service_healthy
            eureka-server:
                condition: service_healthy
            postgres:
                condition: service_healthy
        environment:
            - SPRING_APPLICATION_NAME=appointments_service
            - SERVER_PORT=8086
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            - JWT_SECRET_KEY=${JWT_SECRET_KEY_GEN}
            - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=admin
            - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/AppointmentsService
            - SPRING_JPA_HIBERNATE_DDL_AUTO=update           
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=true
            - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
            - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
            - SPRING_KAFKA_CONSUMER_GROUP_ID=appointments-service
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=com.fotoalpha.*
            - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=latest   
            - SPRING_KAFKA_PRODUCER_KEY_SERIALIZER=org.apache.kafka.common.serialization.StringSerializer
            - SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER=org.springframework.kafka.support.serializer.JsonSerializer 
            - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_ADD_TYPE_HEADERS=true 
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=userDataResponse:com.fotoalpha.appointmentsservice.KafkaEvents.GetUserDataEventResponse,fetchUsers:com.fotoalpha.appointmentsservice.KafkaEvents.FetchUsersEvent,appInfoReq:com.fotoalpha.appointmentsservice.KafkaEvents.AppInfoReqEvent  
            - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=saveAddress:com.fotoalpha.appointmentsservice.KafkaEvents.SaveAddressEvent,deleteAddress:com.fotoalpha.appointmentsservice.KafkaEvents.DeleteAddressEvent,appCreated:com.fotoalpha.appointmentsservice.KafkaEvents.AppointmentCreatedEvent,userData:com.fotoalpha.appointmentsservice.KafkaEvents.GetUserDataEvent,fetchUsers:com.fotoalpha.appointmentsservice.KafkaEvents.FetchUsersEvent,appInfoRes:com.fotoalpha.appointmentsservice.KafkaEvents.AppInfoResEvent           
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
            interval: 10s
            timeout: 3s
            retries: 10
    userratings-service:
        build: ./UserRatingsService/UserRatingsService
        container_name: userratings_service
        ports:
            - "8087:8087"
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
            kafka:
                condition: service_healthy
            eureka-server:
                condition: service_healthy         
        environment:
            - SPRING_APPLICATION_NAME=userratings_service
            - SERVER_PORT=8087
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            - JWT_SECRET_KEY=${JWT_SECRET_KEY_GEN}
            - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=admin
            - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/UserRatingsService
            - SPRING_JPA_HIBERNATE_DDL_AUTO=update
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            - SPRING_KAFKA_CONSUMER_GROUP_ID=userratings-service
            - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_ADD_TYPE_HEADERS=true
            - SPRING_KAFKA_PRODUCER_KEY_SERIALIZER=org.apache.kafka.common.serialization.StringSerializer
            - SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER=org.springframework.kafka.support.serializer.JsonSerializer
            - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=appInfoReq:com.fotoalpha.userratingsservice.KafkaEvents.AppInfoReqEvent
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=true
            - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
            - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=com.fotoalpha.*
            - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=latest
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=appInfoRes:com.fotoalpha.userratingsservice.KafkaEvents.AppInfoResEvent
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
            interval: 10s
            timeout: 3s
            retries: 10
    
    user-service:
        build: ./UserService/UserService
        container_name: user_service
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
            eureka-server:
                condition: service_healthy
        ports:
            - "8088:8088"
        environment:
            - SPRING_APPLICATION_NAME=user-service
            - SERVER_PORT=8088
            - JWT_SECRET_KEY=${JWT_SECRET_KEY_GEN}
            - AWS_REGION=${AWS_REGION}
            - AWS_BUCKETNAME=${AWS_BCKT_NAME}
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=admin
            - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/UserService
            - SPRING_JPA_HIBERNATE_DDL_AUTO=update
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_ADD_TYPE_HEADERS=true
            - SPRING_KAFKA_PRODUCER_KEY_SERIALIZER=org.apache.kafka.common.serialization.StringSerializer
            - SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER=org.springframework.kafka.support.serializer.JsonSerializer
            - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=userDataResponse:com.fotoalpha.userservice.KafkaEvents.GetUserDataEventResponse,pwReset:com.fotoalpha.userservice.KafkaEvents.SendMailEvent,galleryUpdated:com.fotoalpha.userservice.KafkaEvents.GalleryUpdatedEvent
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=true
            - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
            - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=com.fotoalpha.*
            - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=latest
            - SPRING_KAFKA_CONSUMER_GROUP_ID=user-service
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=userData:com.fotoalpha.userservice.KafkaEvents.GetUserDataEvent,saveProfPic:com.fotoalpha.userservice.KafkaEvents.SaveProfilePictureEvent
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
            interval: 10s
            timeout: 3s
            retries: 10

volumes:
    pgdata: 