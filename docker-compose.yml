services:
    eureka-server:
        build: ./EurekaServer/EurekaServer
        container_name: eureka_server
        ports:
            - "8761:8761"
        environment:
            - SPRING_APPLICATION_NAME=eureka-server
            - SERVER_PORT=8761
            - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
            - EUREKA_CLIENT_FETCH_REGISTRY=false
        healthcheck:
            test: ["CMD", "curl","-f","http://localhost:8761/"]
            interval: 10s
            timeout: 3s
            retries: 10
            
    api-gateway:
        build: ./ApiGateway/ApiGateway
        container_name: api_gateway
        ports:
            - "8081:8081"
        depends_on:
            eureka-server:
                condition: service_healthy
        environment:
            - SPRING_APPLICATION_NAME=api-gateway
            - SERVER_PORT=8082
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: kafka
        ports:
            - "9092:9092"
        environment:
            - KAFKA_NODE_ID=1
            - KAFKA_PROCESS_ROLES=broker,controller
            - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
            - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
            - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
            - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
            - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
            - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
        healthcheck:
            test: ["CMD", "bash", "-c","echo > /dev/tcp/localhost/9092"]
            interval: 10s
            timeout: 3s
            retries: 10
            

    portfolio-service:
        build: ./PortfolioService/PortfolioService
        container_name: portfolio_service
        ports:
            - "8082:8082"
        depends_on:
            kafka:
                condition: service_healthy
            postgres:
                condition: service_healthy
            
        environment:
            - SPRING_APPLICATION_NAME=portfolio-service
            - SERVER_PORT=8082
            - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            - SPRING_JPA_HIBERNATE_DDL_AUTO=update
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=admin
            - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/PortfolioService
            - SPRING_DATASOURCE_DRIVE_CLASS_NAME=org.postgresql.Driver
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=true
            - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
            - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
            - SPRING_KAFKA_CONSUMER_GROUP_ID=portfolio-service
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TYPE_MAPPING=com.fotoalpha.awsservice.KafkaEvents.SavePhotosEvent:com.fotoalpha.portfolioservice.KafkaEvents.SavePhotosEvent
            - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=com.fotoalpha.*
            - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=latest
    postgres:
        image: postgres:latest
        container_name: postgresql
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=admin
            - POSTGRES_DB=PortfolioService
        volumes:
            - pgdata:/var/lib/postgresql
        healthcheck:
            test: ["CMD","pg_isready", "-U", "postgres"]
            interval: 10s
            timeout: 5s
            retries: 10
            
    
    aws-service:
        build: ./AwsService/AwsService
        container_name: aws_service
        ports:
            - "8083:8083"
        depends_on:
            kafka:
                condition: service_healthy
            eureka-server:
                condition: service_healthy
        environment:
            -  SPRING_APPLICATION_NAME=aws-service
            -  SERVER_PORT=8083
            -  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
            -  AWS_BUCKET_NAME=fotoalpha-760661274759-eu-north-1-an
            -  AWS_REGION=eu-north-1
            -  AWS_CREDENTIALS_SECRET_KEY=K6ol16RoJWW2jSphymd0iIJGdlQ+h0cpnTGzKJVC
            -  AWS_CREDENTIALS_ACCESS_KEY=AKIA3CGXR6CD3GWBYUC
            -  JWT_SECRET_KEY=yDE+Im6oxNAv3M+bi0IrWNWRWatNJdag1P2uVdWNxOo=
            -  SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_ADD_TYPE_HEADERS=true
            -  SPRING_KAFKA_PRODUCER_KEY_SERIALIZER=org.apache.kafka.common.serialization.StringSerializer
            -  SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER=org.springframework.kafka.support.serializer.JsonSerializer
            -  SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
volumes:
    pgdata: 