spring.application.name=appointments-service
server.port=8086

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
jwt.secret-key=${JWT_SECRET_KEY_GEN}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.url=jdbc:postgresql://localhost:5433/AppointmentsService
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.kafka.bootstrap-servers=localhost:9094

spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.properties.spring.json.type.mapping=saveAddress:com.fotoalpha.appointmentsservice.KafkaEvents.SaveAddressEvent,deleteAddress:com.fotoalpha.appointmentsservice.KafkaEvents.DeleteAddressEvent,appCreated:com.fotoalpha.appointmentsservice.KafkaEvents.AppointmentCreatedEvent,userData:com.fotoalpha.appointmentsservice.KafkaEvents.GetUserDataEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fotoalpha.*
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.properties.spring.json.type.mapping=userDataResponse:com.fotoalpha.appointmentsservice.KafkaEvents.GetUserDataEventResponse

