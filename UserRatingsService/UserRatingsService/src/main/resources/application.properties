spring.application.name=userratings_service
server.port=8087
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
jwt.secret.key=${JWT_SECRET_KEY_GEN}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.url=jdbc:postgresql://localhost:5433/UserRatingsService
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=userratings-service

## PRODUCER ----
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=appInfoReq:com.fotoalpha.userratingsservice.KafkaEvents.AppInfoReqEvent

## CONSUMER ----
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fotoalpha.*
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.properties.spring.json.type.mapping=appInfoRes:com.fotoalpha.userratingsservice.KafkaEvents.AppInfoResEvent