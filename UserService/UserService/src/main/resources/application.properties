spring.application.name=user-service
server.port=8088
jwt.secret.key=${JWT_SECRET_KEY_GEN}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.url=jdbc:postgresql://localhost:5433/UserService
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.kafka.bootstrap-servers=localhost:9094

## PRODUCER ----
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=userDataResponse:com.fotoalpha.userservice.KafkaEvents.GetUserDataEventResponse,pwReset:com.fotoalpha.userservice.KafkaEvents.SendMailEvent


## CONSUMER ----
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fotoalpha.*
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.group-id=user-service
spring.kafka.consumer.properties.spring.json.type.mapping=userData:com.fotoalpha.userservice.KafkaEvents.GetUserDataEvent
